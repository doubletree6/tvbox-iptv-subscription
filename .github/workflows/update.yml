name: Update TVBox IPTV Subscription

on:
  schedule:
    - cron: "15 0,12 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test
        run: python -m unittest discover -s tests

      - name: Build subscription
        run: python -m iptv_failover.server --once cn_all_tvbox_multi.txt --format tvbox-txt

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cn_all_tvbox_multi.txt
          if git diff --cached --quiet; then
            echo "No subscription changes."
          else
            git commit -m "Update TVBox IPTV subscription"
            git push
          fi
